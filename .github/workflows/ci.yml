name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Run linter
      run: npm run lint || true

    - name: Run tests
      run: npm test || true

    - name: Check TypeScript compilation
      run: npx tsc --noEmit

    - name: Test imports
      run: |
        node -e "const cli = require('./dist/cli'); console.log('✓ CLI imports OK')"
        node -e "const orchestrator = require('./dist/orchestrator'); console.log('✓ Orchestrator imports OK')"
        node -e "const memory = require('./dist/memory'); console.log('✓ Memory imports OK')"
        echo "✓ All modules compile successfully"
