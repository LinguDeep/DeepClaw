name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort

    - name: Lint with flake8
      run: |
        # Stop build on syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Check formatting with black
      run: |
        black --check --diff src/ || true

    - name: Check imports with isort
      run: |
        isort --check-only --diff src/ || true

    - name: Syntax check all modules
      run: |
        python -m py_compile src/__init__.py
        python -m py_compile src/agent.py
        python -m py_compile src/cli.py
        python -m py_compile src/config.py
        python -m py_compile src/logger.py
        python -m py_compile src/main.py
        python -m py_compile src/memory.py
        python -m py_compile src/orchestrator.py
        python -m py_compile src/platform_info.py
        python -m py_compile src/provider.py
        python -m py_compile src/safety.py
        python -m py_compile src/sandbox.py
        python -m py_compile src/tools.py
        python -m py_compile src/ui.py
        echo "✓ All modules compile successfully"

    - name: Test imports
      run: |
        python -c "from src.cli import cli_entry; print('✓ CLI imports OK')"
        python -c "from src.orchestrator import Orchestrator; print('✓ Orchestrator imports OK')"
        python -c "from src.ui import LinguClawDashboard; print('✓ UI imports OK')"
        python -c "from src.memory import RAGMemory; print('✓ Memory imports OK')"
